<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jugadors Open la Pobla</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/logo.js" defer></script>
  </head>
  <body class="players-body">
    <header class="players-header">
      <div>
        <p class="eyebrow">Preparacio Open la Pobla</p>
        <h1>Jugadors del quadrant</h1>
      </div>
      <div class="players-actions">
        <a class="home-link" href="/admin">Inici</a>
        <button class="primary-action" id="savePlayers" type="button">Guardar jugadors</button>
      </div>
    </header>

    <main class="players-shell">
      <section class="players-tools">
        <label>
          <span>Enganxar llista rapida</span>
          <textarea id="bulkPlayers" placeholder="Un jugador per linia"></textarea>
        </label>
        <button id="applyBulk" type="button">Omplir 64 places</button>
      </section>

      <section class="players-grid" id="playersGrid"></section>
    </main>

    <script src="/jugadors.js"></script>
  </body>
</html>
